version: "3.9"

services:
  bot:
    build: .
    container_name: demo_aiogram_bot
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./:/app

  db:
    image: postgres:15
    container_name: demo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: demo_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: demo_redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  postgres_data: